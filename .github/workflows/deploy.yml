name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install && npm install --prefix apps/web

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build --prefix apps/web

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          HOST="${FTP_HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST%/}"
          printf 'machine %s\nlogin %s\npassword %s\n' "$HOST" "$FTP_USER" "$FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc
          echo "Connecting to: $HOST"
          lftp -e "set ftp:ssl-force yes; set ssl:verify-certificate no; set net:timeout 60; set net:max-retries 3; open ftp://$HOST; mirror --reverse --delete ./dist/apps/web/ /public_html/; quit"
          rm -f ~/.netrc
