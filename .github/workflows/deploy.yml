name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install && npm install --prefix apps/web

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build --prefix apps/web

      - name: Deploy via FTP
        run: |
          sudo apt-get install -y lftp
          HOST="${{ secrets.FTP_HOST }}"
          HOST="${HOST#ftp://}"
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "ftp://$HOST" \
            -e "set ftp:ssl-allow no; set net:timeout 60; set net:max-retries 3; mirror --reverse --delete ./dist/apps/web/ /public_html/; quit"
