name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install && npm install --prefix apps/web

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build --prefix apps/web

      - name: Verify build output
        run: |
          echo "=== Files in dist/apps/web/ ==="
          find dist/apps/web -type f
          echo "=== index.html head ==="
          head -5 dist/apps/web/index.html

      - name: Deploy via FTP (curl)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cd dist/apps/web

          find . -type f | while IFS= read -r file; do
            file="${file#./}"
            echo "Uploading: $file"
            curl --silent --show-error --ftp-create-dirs \
              --user "${FTP_USER}:${FTP_PASS}" \
              -T "$file" \
              "ftp://${FTP_HOST}/public_html/${file}"
          done

          echo "=== Deploy selesai! ==="
